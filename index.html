<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Team Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <div class="brand-mark">VN</div>
          <div>
            <strong>Von Neumann Research Center</strong>
          </div>
        </div>
        <div class="sidebar-role">
          <label for="roleSelect">Role</label>
          <select id="roleSelect"></select>
        </div>
        <nav class="primary-nav" id="primaryNav"></nav>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Organization Overview</h1>
          </div>
          <div class="topbar-right">
            <div class="topbar-actions" id="topbarActions"></div>
          </div>
        </header>

        <section class="content-area" id="contentArea"></section>
      </main>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true" aria-label="Details panel">
      <div class="drawer-header">
        <div>
          <p class="eyebrow" id="drawerEyebrow">Details</p>
          <h2 id="drawerTitle">Details</h2>
        </div>
        <button class="icon-button" id="closeDrawer" aria-label="Close drawer">x</button>
      </div>
      <div id="drawerBody"></div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
